spring:
  data:
    # mongodb 自带数据库连接池，无需额外配置
    mongodb:
      host: localhost
      port: 27017
      # mongodb 会自动创建逻辑库，无需手动创建
      database: his
      # admin 是 mongodb 的默认逻辑库，用于存储用户、角色、权限等信息，验证用户身份
      authentication-database: admin
      username: admin
      password: ${MONGODB_PASSWORD}

  # shardingsphere 配置
  shardingsphere:
    datasource:
      # 定义数据源名称
      names: master,slave1,slave2
      master:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:7001/his?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
        username: root
        password: ${MYSQL_ROOT_PASSWORD}
      slave1:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:7002/his?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
        username: root
        password: ${MYSQL_ROOT_PASSWORD}
      slave2:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:7003/his?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
        username: root
        password: ${MYSQL_ROOT_PASSWORD}

    rules:
      readwrite-splitting:                                  # 读写分离规则
        data-sources:
          read-write-datasource:                            # 配置读写数据源
            static-strategy:                                # 读写分离类型
              write-data-source-name: master                # 写节点
              read-data-source-names: slave1,slave2         # 读节点，多个从数据源用逗号分隔，或者使用数组表示
            load-balancer-name: round_robin                 # 负载均衡算法名称

        # 负载均衡算法配置
        load-balancers:
          round_robin:
            type: ROUND_ROBIN                               # 负载均衡算法类型

    # sql 打印配置
    props:
      sql-show: true


# MyBatis-Plus 配置
mybatis-plus:
  # 指定 MyBatis 的 XML 映射文件（Mapper XML）的加载路径
  mapper-locations: classpath*:mapper/*.xml
  # 指定 MyBatis 实体类的包路径别名
  type-aliases-package: com.leehuang.his.api.db.entity
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true
  # MyBatis-Plus 全局配置
  global-config:
    db-config:
      # 主键生成策略
      id-type: auto
      # 逻辑删除配置（如果不需要可以注释掉）
      # logic-delete-field: deleted
      # logic-delete-value: 1
      # logic-not-delete-value: 0


# xxl-job 配置，关闭订单定时任务
# xxl-job 配置（关键修改）
xxl:
  job:
    admin:
      # 修改为调度中心实际地址（不能是 localhost）
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: his-api-executor                         # 执行器名称（必须唯一）
      ip:                                               # 留空自动获取本机IP
      port: 9999                                        # 执行器端口（不与 server.port 冲突）
      address:                                          # 留空
      logpath: ./logs/xxl-job/jobhandler                # 本地日志路径
      logretentiondays: 30                              # 日志保留天数
    accessToken: default_token                          # 安全通信令牌，用于调度中心与执行器之间的身份认证，必须与在 docker 中部署的调度中心配置的 token 一致