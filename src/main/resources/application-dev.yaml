spring:
  shardingsphere:
    props:
      sql-show: true

logging:
  level:
    # spring 的日志级别
    root: info
    # mybatis 的日志级别，由于使用了 shardingsphere，无需再用 MyBatis 打印
    com.leehuang.his.api.db.dao: info
    com.baomidou.mybatisplus: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"